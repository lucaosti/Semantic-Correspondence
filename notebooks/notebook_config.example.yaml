paths:
  repo_root: null
  spair_root: null
  checkpoint_dir: checkpoints
  output_dir: runs/notebook_exports

runtime:
  device: null
  num_workers: -1
  preprocess: FIXED_RESIZE
  image_height: 784
  image_width: 784
  limit_pairs: 0
  alphas: [0.05, 0.1, 0.2]
  sample_split: val
  sample_index: 0
  wsa_window: 5
  wsa_temperature: 1.0

finetune:
  enabled: true
  backbone: dinov2_vitb14
  last_blocks: 2
  epochs: 100
  patience: 5
  learning_rate: 5.0e-05
  weight_decay: 0.01
  batch_size: 100
  num_workers: -1
  log_batch_interval: 2500
  resume_save_interval: 100
  resume: null
  dinov2_weights: null
  dinov3_weights: null
  sam_checkpoint: null
  rank: 8
  alpha: 16.0

lora:
  enabled: true
  backbone: dinov2_vitb14
  last_blocks: 2
  epochs: 2
  patience: 3
  learning_rate: 1.0e-03
  weight_decay: 0.0
  batch_size: 100
  num_workers: -1
  log_batch_interval: 2500
  resume_save_interval: 100
  resume: null
  dinov2_weights: null
  dinov3_weights: null
  sam_checkpoint: null
  rank: 8
  alpha: 16.0

experiments:
  - name: dinov2_baseline
    backbone: dinov2_vitb14
    split: test
    dinov2_weights: null
    use_window_soft_argmax: false
    limit: 0

  - name: dinov2_wsa
    backbone: dinov2_vitb14
    split: test
    dinov2_weights: null
    use_window_soft_argmax: true
    wsa_window: 5
    wsa_temperature: 1.0
    limit: 0

  - name: dinov2_finetuned
    backbone: dinov2_vitb14
    split: test
    checkpoint: checkpoints/dinov2_vitb14_lastblocks2_best.pt
    dinov2_weights: null
    use_window_soft_argmax: false
    limit: 0

  - name: dinov2_lora
    backbone: dinov2_vitb14
    split: test
    checkpoint: checkpoints/dinov2_vitb14_lora_r8_best.pt
    dinov2_weights: null
    use_window_soft_argmax: false
    limit: 0

  - name: dinov3_baseline
    backbone: dinov3_vitb16
    split: test
    dinov3_weights: null
    use_window_soft_argmax: false
    limit: 0

  - name: sam_baseline
    backbone: sam_vit_b
    split: test
    sam_checkpoint: null
    use_window_soft_argmax: false
    limit: 0

device_override: null